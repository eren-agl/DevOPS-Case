name: MERN Stack CI/CD

# sadece main'e kod gelince çalıştır
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # kodları sunucuya çek
    - name: Checkout Code
      uses: actions/checkout@v3

    # docker hub'a giriş yap
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # backendi ducker hub'a gönder
    - name: Build and Push Backend
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/mern-backend:latest ./mern-project/server
        docker push ${{ secrets.DOCKER_USERNAME }}/mern-backend:latest

    # frontendi gönder
    - name: Build and Push Frontend
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/mern-frontend:latest ./mern-project/client
        docker push ${{ secrets.DOCKER_USERNAME }}/mern-frontend:latest

    # 5. AWS EKS bağlantısını kur ve yeni kodları yayına al
    - name: Deploy to Kubernetes
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-central-1 # Kendi AWS bölgende değiştirmeyi unutma

    - name: Update KubeConfig
      run: aws eks update-kubeconfig --name senin-cluster-adin --region eu-central-1

    - name: Apply Kubernetes Configs
      run: kubectl apply -f k8s/deploy.yaml
